<h2 id="entities">Entities</h2>
<p>With the goal of making Markdown as HTML-agnostic as possible, all <a href="https://html.spec.whatwg.org/multipage/entities.json">valid HTML entities</a> are recognized and converted into unicode characters</p>
<p>Named entities consist of <code>&amp;</code> + any of the valid HTML5 entity names + <code>;</code></p>
<p>Some examples: - <code>&amp;amp;</code> &amp; - <code>&amp;copy;</code> © - <code>&amp;rarr;</code> →</p>
